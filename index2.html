<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotWheels Controller</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: white;
        }

        h1 { color: #ff4500; margin-bottom: 20px; }

        .status { margin-bottom: 20px; padding: 10px; border-radius: 5px; background: #333; }

        /* Le gros slider */
        input[type=range] {
            width: 80%;
            max-width: 600px;
            height: 80px; /* Très haut pour la précision tactile */
            cursor: pointer;
        }

        .value-display {
            font-size: 3rem;
            font-weight: bold;
            margin: 20px;
            color: #00ffcc;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #ff4500;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:disabled { background-color: #555; }
        button:hover:not(:disabled) { background-color: #ff6347; }
    </style>
</head>
<body>

    <h1>RC Control</h1>

    <div class="status" id="status">Statut : Déconnecté</div>
    
    <button id="connectBtn">SE CONNECTER À LA VOITURE</button>

    <div class="value-display" id="valDisplay">0%</div>
    
    <input type="range" id="motorSlider" min="-100" max="100" value="0">

    <script>
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        let characteristic = null;
        let lastSentValue = 0;
        let isSending = false;

        const connectBtn = document.getElementById('connectBtn');
        const statusText = document.getElementById('status');
        const slider = document.getElementById('motorSlider');
        const valDisplay = document.getElementById('valDisplay');

        // Fonction de connexion
        connectBtn.addEventListener('click', async () => {
            try {
                statusText.innerText = "Recherche...";
                
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'HotWheels' }],
                    optionalServices: [SERVICE_UUID]
                });

                statusText.innerText = "Connexion au serveur...";
                const server = await device.gatt.connect();

                statusText.innerText = "Récupération du service...";
                const service = await server.getPrimaryService(SERVICE_UUID);

                statusText.innerText = "Prêt à piloter !";
                characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

                connectBtn.disabled = true;
                connectBtn.innerText = "CONNECTÉ";
                connectBtn.style.backgroundColor = "#28a745";

            } catch (error) {
                console.error(error);
                statusText.innerText = "Erreur : " + error.message;
            }
        });

        // Fonction d'envoi de données
        async function sendValue(value) {
            if (!characteristic || isSending) return;
            
            isSending = true;
            try {
                // On envoie la valeur sous forme de texte (String) comme attendu par ton ESP32
                const encoder = new TextEncoder();
                await characteristic.writeValue(encoder.encode(value.toString()));
                lastSentValue = value;
            } catch (error) {
                console.log("Erreur d'envoi: " + error);
            }
            isSending = false;
        }

        // Ecouteur du slider
        slider.addEventListener('input', (e) => {
            const val = e.target.value;
            valDisplay.innerText = val + "%";
            
            // On n'envoie que si la valeur a changé pour ne pas saturer le BT
            if (val !== lastSentValue) {
                sendValue(val);
            }
        });

        // Remettre à zéro quand on relâche le slider (sécurité)
        slider.addEventListener('change', (e) => {
            e.target.value = 0;
            valDisplay.innerText = "0%";
            sendValue(0);
        });

    </script>
</body>
</html>
