<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotWheels Ultra-Control</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        h1 { color: #ffab00; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Console de log sur l'écran */
        #debugConsole { width: 90%; max-width: 500px; height: 120px; background: #000; border: 1px solid #444; color: #0f0; font-size: 12px; padding: 10px; overflow-y: auto; margin-bottom: 20px; border-radius: 8px; }
        
        .card { background: #222; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 500px; }
        
        button { background: linear-gradient(135deg, #ff4500, #ff8c00); color: white; border: none; padding: 15px 40px; font-size: 1.2rem; font-weight: bold; border-radius: 50px; cursor: pointer; margin-bottom: 30px; transition: 0.3s; box-shadow: 0 4px 15px rgba(255, 69, 0, 0.4); }
        button:active { transform: scale(0.95); }
        button:disabled { background: #444; box-shadow: none; }

        .slider-container { width: 100%; text-align: center; }
        .val-display { font-size: 4rem; font-weight: 800; color: #ffab00; margin: 10px 0; }
        
        /* Gros slider pour la précision */
        input[type=range] { -webkit-appearance: none; width: 100%; height: 60px; background: #333; border-radius: 30px; outline: none; margin: 20px 0; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 60px; height: 60px; background: #ffab00; border-radius: 50%; cursor: pointer; border: 4px solid #fff; }
    </style>
</head>
<body>

    <h1>HotWheels V1</h1>

    <div id="debugConsole">Attente d'action...</div>

    <div class="card">
        <button id="connectBtn">SCANNER & CONNECTER</button>
        
        <div class="slider-container">
            <div class="val-display" id="valDisplay">0%</div>
            <input type="range" id="motorSlider" min="-100" max="100" value="0">
        </div>
    </div>

    <script>
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        let characteristic = null;
        const debugConsole = document.getElementById('debugConsole');

        function log(msg, color = "#0f0") {
            const div = document.createElement('div');
            div.style.color = color;
            div.innerText = `> ${msg}`;
            debugConsole.appendChild(div);
            debugConsole.scrollTop = debugConsole.scrollHeight;
        }

        document.getElementById('connectBtn').addEventListener('click', async () => {
            log("Lancement du scan...", "#ffab00");
            try {
                // CONFIGURATION LA PLUS LARGE POSSIBLE
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [SERVICE_UUID]
                });

                log(`Trouvé: ${device.name || "Appareil sans nom"}`);
                const server = await device.gatt.connect();
                log("Connecté au serveur GATT");

                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

                log("Prêt à piloter !", "#00ff00");
                document.getElementById('connectBtn').innerText = "VÉHICULE CONNECTÉ";
                document.getElementById('connectBtn').disabled = true;

            } catch (error) {
                log(`ERREUR: ${error.message}`, "#ff4444");
                console.error(error);
            }
        });

        const slider = document.getElementById('motorSlider');
        const valDisplay = document.getElementById('valDisplay');
        let isSending = false;

        async function sendValue(v) {
            if (!characteristic || isSending) return;
            isSending = true;
            try {
                const encoder = new TextEncoder();
                await characteristic.writeValue(encoder.encode(v.toString()));
            } catch (e) {
                // On log pas tout pour ne pas saturer la petite console
            }
            isSending = false;
        }

        slider.addEventListener('input', (e) => {
            valDisplay.innerText = e.target.value + "%";
            sendValue(e.target.value);
        });

        // Sécurité : arrêt quand on relâche
        slider.addEventListener('change', (e) => {
            slider.value = 0;
            valDisplay.innerText = "0%";
            sendValue(0);
        });
    </script>
</body>
</html>
