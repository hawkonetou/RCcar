<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HotWheels Controller</title>
    <style>
        /* Bloquer le défilement et le zoom pour stabiliser le slider */
        html, body { 
            position: fixed; overflow: hidden; width: 100%; height: 100%;
            margin: 0; padding: 0; background: #121212; color: white;
            font-family: sans-serif; touch-action: none; 
        }
        body { display: flex; flex-direction: column; align-items: center; justify-content: space-around; }

        /* Boîte de debug noire */
        #debugConsole { 
            width: 90%; height: 60px; background: #000; border: 1px solid #444; 
            color: #0f0; font-size: 11px; padding: 10px; overflow-y: auto; border-radius: 5px;
            font-family: monospace;
        }

        .status-container { display: flex; align-items: center; font-size: 14px; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #ff4444; margin-right: 8px; }
        .online { background: #00ff00; box-shadow: 0 0 10px #00ff00; }

        button { 
            background: #ff4500; color: white; border: none; padding: 20px 40px; 
            font-size: 1.2rem; font-weight: bold; border-radius: 10px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 69, 0, 0.3);
        }

        .val-display { font-size: 5rem; font-weight: bold; color: #ffab00; text-shadow: 0 0 20px rgba(255,171,0,0.3); }

        /* Slider géant pour mobile */
        .slider-wrapper { width: 90%; }
        input[type=range] {
            -webkit-appearance: none; width: 100%; height: 80px; 
            background: #333; border-radius: 40px; outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 70px; height: 70px;
            background: #fff; border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="debugConsole">Initialisation...</div>

    <div class="status-container">
        <div id="dot" class="status-dot"></div>
        <span id="statusTxt">Déconnecté</span>
    </div>

    <button id="connectBtn">SE CONNECTER</button>

    <div class="val-display" id="valDisplay">0%</div>

    <div class="slider-wrapper">
        <input type="range" id="motorSlider" min="-100" max="100" value="0">
    </div>

    <script>
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        let characteristic = null;
        const debugConsole = document.getElementById('debugConsole');
        const slider = document.getElementById('motorSlider');
        const valDisplay = document.getElementById('valDisplay');

        function log(msg) { debugConsole.innerText = msg; }

        // --- CONNEXION ---
        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                log("Recherche de l'ESP32...");
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [SERVICE_UUID]
                });

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

                // Activer les notifications pour recevoir le texte de l'ESP32
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', (event) => {
                    const decoder = new TextDecoder();
                    log(decoder.decode(event.target.value));
                });

                document.getElementById('dot').classList.add('online');
                document.getElementById('statusTxt').innerText = "Connecté à " + device.name;
                document.getElementById('connectBtn').style.display = "none";
                log("Prêt à piloter !");
            } catch (e) {
                log("Erreur: " + e.message);
            }
        });

        // --- ENVOI DES DONNÉES ---
        async function sendValue(v) {
            if (!characteristic) return;
            try {
                const encoder = new TextEncoder();
                // Utilisation du mode rapide sans attente de réponse
                await characteristic.writeValueWithoutResponse(encoder.encode(v.toString()));
            } catch (e) { console.error(e); }
        }

        slider.addEventListener('input', (e) => {
            valDisplay.innerText = e.target.value + "%";
            sendValue(e.target.value);
        });

        // Sécurité : arrêt quand on lâche le doigt
        slider.addEventListener('touchend', () => {
            slider.value = 0;
            valDisplay.innerText = "0%";
            sendValue(0);
        });
    </script>
</body>
</html>
